<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trace Dataset Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #0f0f16; color: #e0e0e0; padding: 1rem; min-height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 1rem; border-bottom: 1px solid #2a2a35; margin-bottom: 1.5rem; }
    h1 { font-size: 1rem; color: #00e676; }
    .header-right { display: flex; gap: 0.75rem; align-items: center; }
    .header-right a { color: #4fc3f7; font-size: 0.7rem; text-decoration: none; }
    .header-right span { color: #666; font-size: 0.6rem; }

    .v-section { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #1e1e2a; }
    .v-section:last-of-type { border-bottom: none; }
    .v-title { font-size: 0.9rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; }
    .v-sub { font-size: 0.65rem; color: #666; margin-bottom: 0.8rem; }

    .track-block { background: #161620; border-radius: 8px; padding: 0.7rem; margin-bottom: 0.6rem; border: 1px solid #2a2a35; }
    .t-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 0.3rem; font-weight: 600; }
    .def-text { font-size: 0.6rem; color: #555; margin-bottom: 0.5rem; line-height: 1.3; }

    .q-row { display: flex; align-items: center; margin: 0.2rem 0; gap: 0.3rem; }
    .q-lbl { width: 45px; font-size: 0.55rem; text-transform: uppercase; }
    .q-lbl.great { color: #00e676; }
    .q-lbl.good { color: #4fc3f7; }
    .q-lbl.mediocre { color: #ffb74d; }
    .q-lbl.poor { color: #ef5350; }
    .bar-bg { flex: 1; height: 4px; background: #252530; border-radius: 2px; overflow: hidden; }
    .bar { height: 100%; border-radius: 2px; }
    .bar.great { background: #00e676; }
    .bar.good { background: #4fc3f7; }
    .bar.mediocre { background: #ffb74d; }
    .bar.poor { background: #ef5350; }
    .q-ct { width: 20px; text-align: right; font-size: 0.55rem; color: #888; }

    .sub-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin: 0.6rem 0 0.25rem; font-weight: 600; }
    .c-row { display: flex; align-items: center; margin: 0.15rem 0; gap: 0.3rem; }
    .c-pill { padding: 0.1rem 0.4rem; border-radius: 6px; font-size: 0.55rem; background: #252530; color: #aaa; min-width: 30px; text-align: center; }
    .c-ct { font-size: 0.55rem; color: #888; }

    .refresh-note { color: #555; font-size: 0.6rem; text-align: center; padding-top: 1rem; border-top: 1px solid #2a2a35; }
    .track-block { overflow: hidden; }
    .def-text { word-break: break-word; hyphens: auto; }
    @media (max-width: 480px) {
      body { padding: 0.6rem; }
      .q-lbl { width: 38px; font-size: 0.5rem; }
      .def-text { font-size: 0.55rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Trace Dataset Monitor</h1>
    <div class="header-right">
      <a href="https://chuck1823.github.io/mom-and-pop-site/" target="_blank">Mom & Pop</a>
      <span id="updated"></span>
    </div>
  </div>

  <div id="verticals"></div>

  <div class="refresh-note">Rebuild stats: python3 experiment/scripts/export-all.py, then push stats.json</div>

  <script>
    const vNames = {
      nail_salon: 'Nail Salon',
      barber: 'Barber Shop',
      dry_cleaner: 'Dry Cleaner',
      restaurant: 'Restaurant',
      salon_hair: 'Hair Salon',
      auto_repair: 'Auto Repair',
      general_assistant: 'General Assistant'
    };
    const tNames = { sft: 'SFT', agentic: 'Agentic', distill: 'Distill' };
    const defs = {
      sft: 'Plain text only. Compatible with every fine-tuning API (OpenAI, Together, Fireworks, Unsloth, LLaMA-Factory).',
      agentic: 'Tool calls + results. Compatible with OpenAI, Together, Fireworks, vLLM.',
      distill: 'SFT + internal reasoning/thinking. Captures full thought process for distillation into smaller models.'
    };

    async function load() {
      try { const r = await fetch('stats.json'); render(await r.json()); }
      catch(e) { document.body.innerHTML = '<p style="color:#ef5350;padding:1rem">Failed to load stats.json</p>'; }
    }

    function render(data) {
      document.getElementById('updated').textContent = data.updated_at || '';
      const el = document.getElementById('verticals');
      el.innerHTML = '';

      // Group by vertical across all tracks
      const byV = {};
      for (const [tName, track] of Object.entries(data.tracks)) {
        const verts = track.verticals || {};
        for (const [vName, count] of Object.entries(verts)) {
          if (!byV[vName]) byV[vName] = { sft: null, agentic: null, distill: null, total: 0 };
          byV[vName][tName] = { count: count, quality: track.quality, tasks: track.tasks };
          byV[vName].total += count;
        }
      }

      const sorted = Object.entries(byV).sort((a, b) => b[1].total - a[1].total);

      for (const [vKey, vData] of sorted) {
        if (vData.total === 0) continue;
        let html = '<div class="v-section">';
        html += '<div class="v-title">' + (vNames[vKey] || vKey) + '</div>';
        html += '<div class="v-sub">' + vData.total + ' traces across all datasets</div>';

        for (const tKey of ['sft', 'agentic', 'distill']) {
          const info = vData[tKey];
          if (!info) continue;
          html += '<div class="track-block">';
          html += '<div class="t-label">' + tNames[tKey] + ' — ' + info.count + ' traces</div>';
          html += '<div class="def-text">' + (defs[tKey] || '') + '</div>';

          // Quality bars
          const maxQ = Math.max(...Object.values(info.quality), 1);
          for (const [q, c] of Object.entries(info.quality)) {
            if (c === 0) continue;
            html += '<div class="q-row"><span class="q-lbl ' + q + '">' + q + '</span><div class="bar-bg"><div class="bar ' + q + '" style="width:' + (c/maxQ*100) + '%"></div></div><span class="q-ct">' + c + '</span></div>';
          }

          // Task categories
          if (info.tasks && Object.keys(info.tasks).length) {
            html += '<div class="sub-label">Tasks</div>';
            for (const [cat, c] of Object.entries(info.tasks)) {
              html += '<div class="c-row"><span class="c-pill">' + cat + '</span><span class="c-ct">' + c + '</span></div>';
            }
          }
          html += '</div>';
        }
        html += '</div>';
        el.innerHTML += html;
      }
    }

    load();
  </script>
</body>
</html>
