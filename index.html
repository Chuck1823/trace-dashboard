<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trace Dataset Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #0f0f16; color: #e0e0e0; padding: 1rem; min-height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 1rem; border-bottom: 1px solid #2a2a35; margin-bottom: 1.5rem; }
    h1 { font-size: 1rem; color: #00e676; }
    .header-right { display: flex; gap: 0.75rem; align-items: center; }
    .header-right a { color: #4fc3f7; font-size: 0.7rem; text-decoration: none; }
    .header-right span { color: #666; font-size: 0.6rem; }

    /* Summary card */
    .summary-card { background: linear-gradient(135deg, rgba(0,230,118,0.05), rgba(79,195,247,0.05)); border: 1px solid rgba(0,230,118,0.15); border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .summary-card h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 1rem; font-weight: 600; }

    /* Per-track summary row */
    .track-summary { background: #161620; border-radius: 8px; margin-bottom: 0.75rem; border: 1px solid #2a2a35; padding: 1rem; }
    .ts-header { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.75rem; }
    .ts-name { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; font-weight: 600; }
    .ts-total { font-size: 0.55rem; color: #555; }
    .ts-leading { display: flex; gap: 1rem; align-items: flex-end; margin-bottom: 0.75rem; }
    .ts-big { font-size: 2.5rem; font-weight: 800; color: #fff; letter-spacing: -2px; line-height: 1; }
    .ts-lab { font-size: 0.8rem; color: #4fc3f7; font-weight: 600; text-transform: capitalize; margin-bottom: 4px; }
    .ts-labels { flex: 1; }
    .tl-row { display: flex; align-items: center; margin-bottom: 6px; gap: 0.5rem; }
    .tl-name { font-size: 0.7rem; font-weight: 600; color: #ccc; min-width: 80px; text-transform: capitalize; }
    .tl-bar-bg { flex: 1; height: 8px; background: #1a1a28; border-radius: 4px; overflow: hidden; }
    .tl-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .tl-ct { font-size: 0.65rem; color: #888; min-width: 50px; text-align: right; }
    .tl-ct .goal { color: #555; }

    /* Quality bars */
    .t-card { background: #161620; border-radius: 8px; margin-bottom: 1.2rem; border: 1px solid #2a2a35; overflow: hidden; }
    .t-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; padding: 0.5rem 0.7rem 0.2rem; font-weight: 600; background: rgba(255,255,255,0.02); }
    .def-text { font-size: 0.52rem; color: #666; padding: 0 0.7rem 0.4rem; line-height: 1.4; word-break: break-word; }
    .q-row { display: flex; align-items: center; margin: 0.18rem 0.7rem; gap: 0.3rem; }
    .q-lbl { width: 42px; font-size: 0.52rem; text-transform: uppercase; }
    .q-lbl.great { color: #00e676; }
    .q-lbl.good { color: #4fc3f7; }
    .q-lbl.mediocre { color: #ffb74d; }
    .q-lbl.poor { color: #ef5350; }
    .bar-bg { flex: 1; height: 4px; background: #252530; border-radius: 2px; overflow: hidden; }
    .bar { height: 100%; border-radius: 2px; }
    .bar.great { background: #00e676; }
    .bar.good { background: #4fc3f7; }
    .bar.mediocre { background: #ffb74d; }
    .bar.poor { background: #ef5350; }
    .q-ct { width: 18px; text-align: right; font-size: 0.5rem; color: #888; }
    .refresh-note { color: #555; font-size: 0.6rem; text-align: center; padding-top: 1rem; border-top: 1px solid #2a2a35; }

    @media (max-width: 520px) {
      .ts-leading { gap: 0.5rem; }
      .ts-big { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Trace Dataset Monitor</h1>
    <div class="header-right">
      <a href="https://chuck1823.github.io/mom-and-pop-site/" target="_blank">Mom & Pop</a>
      <span id="updated"></span>
    </div>
  </div>

  <div class="summary-card" id="summary-card"></div>

  <div id="dashboard"></div>
  <div class="refresh-note">Rebuild stats: python3 experiment/trace-dashboard/app.py → push stats.json</div>

  <script>
    async function load() {
      try { const r = await fetch('stats.json'); render(await r.json()); }
      catch(e) { document.body.innerHTML = '<p style="color:#ef5350;padding:1rem">Failed to load stats.json</p>'; }
    }

    const labelColors = {
      'devops':'#4fc3f7','research':'#9c27b0','coding':'#4caf50',
      'workflow_automation':'#ff9800','general_assistant':'#888888',
      'unclassified':'#555','testing':'#e91e63','documentation':'#00bcd4',
      'nail_salon':'#ff9800','barber_shop':'#795548','restaurant':'#f44336',
      'spa_wellness':'#8bc34a','fitness_gym':'#e91e63',
      'booking_appointment':'#4caf50','inventory_management':'#ff5722',
      'customer_qa':'#2196f3'
    };

    function render(data) {
      document.getElementById('updated').textContent = data.updated_at || '';

      // Summary: per-dataset leading label, NOT cumulative
      const sc = document.getElementById('summary-card');
      sc.innerHTML = '<h2>Leading Labels — Per Dataset</h2>';

      for (const trackName of ['sft', 'agentic', 'distill']) {
        const t = data.tracks[trackName];
        if (!t || t.total === 0 || !t.label_counts) continue;

        // Find leading label for this track
        let leadingLabel = 'none', leadingCount = 0;
        for (const [lab, ct] of Object.entries(t.label_counts)) {
          if (lab.startsWith('_')) continue;
          if (ct > leadingCount) { leadingCount = ct; leadingLabel = lab; }
        }

        // All labels for this track
        const labels = Object.entries(t.label_counts).filter(([l]) => !l.startsWith('_')).sort((a, b) => b[1] - a[1]);

        let html = '<div class="track-summary">';
        html += '<div class="ts-header"><span class="ts-name">' + trackName.toUpperCase() + '</span><span class="ts-total">' + t.total + ' traces</span></div>';
        html += '<div class="ts-leading">';
        html += '<span class="ts-big">' + leadingCount + '</span>';
        html += '<span class="ts-lab">' + (leadingLabel !== 'none' ? leadingLabel.replace(/_/g, ' ') : 'no labels') + '</span>';
        html += '</div>';

        // Label bars
        if (labels.length > 0) {
          for (const [lab, ct] of labels) {
            const pct = Math.min(ct / 200 * 100, 100);
            const color = labelColors[lab] || '#a78bfa';
            html += '<div class
