<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trace Dataset Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #0f0f16; color: #e0e0e0; padding: 1rem; min-height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 1rem; border-bottom: 1px solid #2a2a35; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem; }
    h1 { font-size: 1.1rem; color: #00e676; }
    .header-right { display: flex; gap: 1rem; align-items: center; }
    .header-right a { color: #4fc3f7; font-size: 0.75rem; text-decoration: none; }
    .header-right span { color: #666; font-size: 0.65rem; }
    .dataset-section { margin-bottom: 2rem; }
    .dataset-header { margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #2a2a35; }
    .dataset-name { font-size: 1rem; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.1em; }
    .dataset-count { font-size: 0.85rem; color: #00e676; font-weight: 600; margin-left: 0.5rem; }
    .dataset-desc { font-size: 0.75rem; color: #888; margin-top: 0.25rem; }
    .goal-section { margin-bottom: 2rem; }
    .goal-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: baseline; }
    .goal-item { background: #1a1a24; border: 1px solid #2a2a35; border-radius: 8px; padding: 0.5rem 0.75rem; display: flex; gap: 0.5rem; align-items: center; }
    .goal-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #aaa; }
    .goal-val { font-size: 0.85rem; font-weight: 700; color: #fff; }
    .goal-pct { font-size: 0.7rem; color: #00e676; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .card { background: #1a1a24; border-radius: 10px; padding: 1rem; border: 1px solid #2a2a35; }
    .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.75rem; }
    .track-name { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #aaa; }
    .track-total { font-size: 1.5rem; font-weight: 700; color: #00e676; }
    .q-row { display: flex; align-items: center; margin: 0.3rem 0; gap: 0.4rem; }
    .q-label { width: 55px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.3px; }
    .q-label.great { color: #00e676; }
    .q-label.good { color: #4fc3f7; }
    .q-label.mediocre { color: #ffb74d; }
    .q-label.poor { color: #ef5350; }
    .bar-bg { flex: 1; height: 5px; background: #252530; border-radius: 3px; overflow: hidden; }
    .bar { height: 100%; border-radius: 3px; }
    .bar.great { background: #00e676; }
    .bar.good { background: #4fc3f7; }
    .bar.mediocre { background: #ffb74d; }
    .bar.poor { background: #ef5350; }
    .q-count { width: 25px; text-align: right; font-size: 0.7rem; font-weight: 600; color: #999; }
    .cat-section { background: #1a1a24; border-radius: 10px; padding: 1rem; border: 1px solid #2a2a35; margin-bottom: 1.5rem; }
    .cat-section h3 { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
    .cat-row { display: flex; align-items: center; gap: 0.4rem; margin: 0.3rem 0; }
    .cat-pill { padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.65rem; background: #2a2a35; color: #aaa; min-width: 50px; text-align: center; }
    .cat-count { font-size: 0.7rem; color: #999; }
    .refresh-note { color: #555; font-size: 0.65rem; text-align: center; padding-top: 1rem; border-top: 1px solid #2a2a35; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .header { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Trace Dataset Monitor</h1>
    <div class="header-right">
      <a href="https://chuck1823.github.io/mom-and-pop-site/" target="_blank">Mom & Pop</a>
      <a href="https://chuck1823.github.io/famcloud-site/" target="_blank">FamCloud</a>
      <span id="updated"></span>
    </div>
  </div>

  <div id="goalsSection" class="goal-section"></div>

  <div id="datasetCards"></div>

  <div class="refresh-note">Rebuild stats: python3 experiment/scripts/export-all.py, then push updated stats.json</div>

  <script>
    async function loadStats() {
      try {
        const res = await fetch('stats.json');
        const data = await res.json();
        render(data);
      } catch(e) { console.error(e); document.body.innerHTML = '<p style="color:#ef5350;padding:1rem">Failed to load stats.json</p>'; }
    }

    const defs = {
      sft: 'SFT (Supervised Fine-Tuning): Plain text only - system prompt, user messages, assistant responses. Compatible with every fine-tuning API (OpenAI, Together, Fireworks, Unsloth, LLaMA-Factory, Pioneer).',
      agentic: 'Agentic (Tool-Call): Includes tool_calls and tool_result messages. Traces show the agent calling tools, getting results, and responding.',
      distill: 'Distill (SFT + Reasoning): Like SFT but each assistant message includes both the response and the internal reasoning/thinking. Captures the full thought process for knowledge distillation into smaller models.'
    };

    function render(data) {
      document.getElementById('updated').textContent = 'Built: ' + (data.updated_at || '--');

      // Goals row
      const goalsSection = document.getElementById('goalsSection');
      let goalsHTML = '<div class="goal-row">';
      const target = 200;
      for (const [name, track] of Object.entries(data.tracks)) {
        const pct = Math.round((track.total / target) * 100);
        goalsHTML += '<div class="goal-item"><span class="goal-label">' + name.toUpperCase() + '</span><span class="goal-val">' + track.total + '/' + target + '</span><span class="goal-pct">' + pct + '%</span></div>';
      }
      goalsHTML += '</div>';
      goalsSection.innerHTML = goalsHTML;

      // Each dataset gets its own card with quality + categories
      const cardsDiv = document.getElementById('datasetCards');
      cardsDiv.innerHTML = '';
      for (const [name, track] of Object.entries(data.tracks)) {
        const card = document.createElement('div');
        card.className = 'card';

        // Quality bars
        let qHTML = '';
        const maxQ = Math.max(...Object.values(track.quality), 1);
        for (const [q, c] of Object.entries(track.quality)) {
          qHTML += '<div class="q-row"><span class="q-label ' + q + '">' + q + '</span><div class="bar-bg"><div class="bar ' + q + '" style="width:' + (c / maxQ * 100) + '%"></div></div><span class="q-count">' + c + '</span></div>';
        }

        // Category breakdown for this track
        let catHTML = '';
        const cats = track.tasks || {};
        const maxCat = Math.max(...Object.values(cats), 1);
        const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
        for (const [cat, c] of sorted) {
          catHTML += '<div class="cat-row"><span class="cat-pill">' + cat + '</span><div class="bar-bg" style="flex:1"><div class="bar good" style="width:' + (c / maxCat * 100) + '%;background:#4fc3f7"></div></div><span class="cat-count">' + c + '</span></div>';
        }

        card.innerHTML = '<div class="dataset-section">' +
          '<div class="dataset-header"><span class="dataset-name">' + name + '</span><span class="dataset-count">' + track.total + ' traces</span></div>' +
          '<div class="dataset-desc">' + (defs[name] || '') + '</div>' +
        '</div>' +
        qHTML + '<div style="margin-top:0.75rem;border-top:1px solid #2a2a35;padding-top:0.5rem">' +
        '<h3 class="cat-section" style="border:none;background:none;padding:0;margin:0;"><span style="font-size:0.7rem;color:#aaa;text-transform:uppercase;letter-spacing:0.1em">Categories</span>' + catHTML + '</h3></div>';
        cardsDiv.appendChild(card);
      }
    }

    loadStats();
  </script>
</body>
</html>
